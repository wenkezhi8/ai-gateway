groups:
  - name: ai-gateway.rules
    rules:
      # Service availability alerts
      - alert: GatewayDown
        expr: up{job="ai-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "AI Gateway service is down"
          message: "AI Gateway instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: GatewayHighErrorRate
        expr: |
          sum(rate(ai_gateway_api_requests_failed_total[5m])) by (endpoint)
          /
          sum(rate(ai_gateway_api_requests_total[5m])) by (endpoint)
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High error rate on AI Gateway"
          message: "Endpoint {{ $labels.endpoint }} has error rate > 5% for 5 minutes. Current: {{ $value | humanizePercentage }}"

      # Response time alerts
      - alert: GatewayHighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(ai_gateway_api_response_time_seconds_bucket[5m])) by (le, endpoint))
          > 0.2
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High API response time (P99 > 200ms)"
          message: "Endpoint {{ $labels.endpoint }} P99 latency is {{ $value | humanizeDuration }}, which exceeds 200ms threshold."

      - alert: GatewayVeryHighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(ai_gateway_api_response_time_seconds_bucket[5m])) by (le, endpoint))
          > 0.5
        for: 3m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Critical API response time (P99 > 500ms)"
          message: "Endpoint {{ $labels.endpoint }} P99 latency is {{ $value | humanizeDuration }}, which exceeds 500ms threshold."

      # Token usage alerts
      - alert: TokenUsageHigh
        expr: ai_gateway_api_token_usage_percent > 80
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Token usage above 80%"
          message: "User {{ $labels.user_id }} model {{ $labels.model }} token usage is at {{ $value }}%."

      - alert: TokenUsageCritical
        expr: ai_gateway_api_token_usage_percent > 90
        for: 2m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Token usage above 90%"
          message: "User {{ $labels.user_id }} model {{ $labels.model }} token usage is at {{ $value }}%. Immediate attention required."

      # Provider failure alerts
      - alert: ProviderHighFailureRate
        expr: ai_gateway_provider_failure_rate > 5
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Provider failure rate > 5%"
          message: "Provider {{ $labels.provider }} has failure rate of {{ $value }}%. Please check provider status."

      - alert: ProviderHighFailureRateCritical
        expr: ai_gateway_provider_failure_rate > 15
        for: 3m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Provider failure rate > 15%"
          message: "Provider {{ $labels.provider }} has critical failure rate of {{ $value }}%. Consider switching providers."

      - alert: ProviderLatencyHigh
        expr: |
          histogram_quantile(0.95, sum(rate(ai_gateway_provider_latency_seconds_bucket[5m])) by (le, provider))
          > 10
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Provider latency is high (P95 > 10s)"
          message: "Provider {{ $labels.provider }} P95 latency is {{ $value | humanizeDuration }}."

      # Cache performance alerts
      - alert: CacheHitRateLow
        expr: ai_gateway_api_cache_hit_rate < 20
        for: 15m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Cache hit rate below 20%"
          message: "Cache {{ $labels.cache_type }} hit rate is only {{ $value }}%. Consider reviewing cache strategy."

      # Rate limiter alerts
      - alert: RateLimitExceededFrequently
        expr: |
          sum(rate(ai_gateway_ratelimit_exceeded_total[5m])) by (user_id)
          > 10
        for: 5m
        labels:
          severity: info
          service: ai-gateway
        annotations:
          summary: "User frequently exceeding rate limits"
          message: "User {{ $labels.user_id }} is exceeding rate limits frequently ({{ $value }}/s). Consider adjusting limits."

      # Connection alerts
      - alert: HighActiveConnections
        expr: sum(ai_gateway_api_active_connections) > 1000
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High number of active connections"
          message: "There are {{ $value }} active connections. Consider scaling."

      # System resource alerts (from node exporter)
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
          > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          message: "Memory usage is at {{ $value }}%."

      - alert: HighCPUUsage
        expr: |
          100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          message: "CPU usage is at {{ $value }}%."
