global:
  # SMTP configuration for email notifications
  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

  # Default resolve timeout
  resolve_timeout: 5m

# Templates
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Inhibition rules
inhibit_rules:
  # If critical is firing, suppress warning
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'instance']

  # If provider is down, suppress provider-related warnings
  - source_matchers:
      - alertname="ProviderDown"
    target_matchers:
      - alertname=~"Provider.*"
    equal: ['provider']

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'service']

  # Wait time before sending initial notification
  group_wait: 30s

  # Wait time before sending updated notification
  group_interval: 5m

  # Wait time before resending notification
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - matchers:
        - severity="critical"
      receiver: 'critical-receiver'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: true

    # Warning alerts
    - matchers:
        - severity="warning"
      receiver: 'warning-receiver'
      group_wait: 1m
      group_interval: 5m
      repeat_interval: 4h

    # Info alerts
    - matchers:
        - severity="info"
      receiver: 'info-receiver'
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 24h

# Receivers
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 100

  - name: 'critical-receiver'
    # DingTalk webhook for critical alerts
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 50
    # Email for critical alerts
    email_configs:
      - to: '${EMAIL_TO}'
        send_resolved: true
        html: '{{ template "email.default.html" . }}'

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 100

  - name: 'info-receiver'
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 200

# Time intervals for muted notifications (optional)
time_intervals:
  - name: business-hours
    time_intervals:
      - times:
          - start_time: "09:00"
            end_time: "18:00"
        weekdays: ['monday:friday']
        location: 'Asia/Shanghai'
