# ============================================
# AI Gateway - Production Docker Compose
# Use this for production deployments
# ============================================

version: '3.8'

services:
  # ===========================================
  # Core Services
  # ===========================================

  gateway:
    image: ${DOCKER_REGISTRY:-}ai-gateway:${VERSION:-latest}
    container_name: ai-gateway-prod
    ports:
      - "${GATEWAY_PORT:-8000}:8080"
    environment:
      - GIN_MODE=release
      - CONFIG_PATH=/app/configs/config.json
      - PORT=8080
      # Redis configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BACKUP_API_KEY=${OPENAI_BACKUP_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      # Volcano Ark (火山方舟)
      - VOLCANO_API_KEY=${VOLCANO_API_KEY:-}
      - VOLCANO_ENDPOINT=${VOLCANO_ENDPOINT:-}
      # Advanced settings
      - LOG_LEVEL=${LOG_LEVEL:-warn}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-60}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-10}
      # Cache settings
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-100}
      # Intent engine + vector cache
      - INTENT_ENGINE_ENABLED=${INTENT_ENGINE_ENABLED:-false}
      - INTENT_ENGINE_BASE_URL=${INTENT_ENGINE_BASE_URL:-http://intent-engine:18566}
      - VECTOR_CACHE_ENABLED=${VECTOR_CACHE_ENABLED:-true}
      - VECTOR_CACHE_DIMENSION=${VECTOR_CACHE_DIMENSION:-1024}
    volumes:
      - ./configs:/app/configs:ro
      - gateway-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      # intent-engine 是可选服务，当 INTENT_ENGINE_ENABLED=true 时才会真正需要
      # 如果使用 intent-engine，请先启动：docker compose --profile intent-engine up -d intent-engine
    restart: always
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=8080"
      - "prometheus.io/path=/metrics"

  redis:
    image: redis/redis-stack-server:${REDIS_VERSION:-7.2.0-v18}
    container_name: ai-gateway-redis-stack-prod
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: always
    networks:
      - ai-gateway-network
    command: >
      redis-stack-server
      --appendonly yes
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: ai-gateway-ollama-prod
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: always
    networks:
      - ai-gateway-network
    profiles:
      - standard
      - enterprise
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:${QDRANT_VERSION:-latest}
    container_name: ai-gateway-qdrant-prod
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: always
    networks:
      - ai-gateway-network
    profiles:
      - enterprise
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  intent-engine:
    # 意图识别引擎（可选）。默认不启动，避免依赖私有镜像。
    # 使用方式：
    #   1. 设置环境变量 INTENT_ENGINE_ENABLED=true 启用该服务
    #   2. 设置环境变量 INTENT_ENGINE_IMAGE 指定镜像地址
    #   3. 或者修改下方 image 为公开镜像地址（如 Docker Hub 公开镜像）
    # 公开镜像示例（如存在）：
    #   image: ${INTENT_ENGINE_IMAGE:-docker.io/library/python:3.11}
    #   image: ${INTENT_ENGINE_IMAGE:-}  # 默认空，需手动指定镜像
    image: ${INTENT_ENGINE_IMAGE:-}
    container_name: ai-gateway-intent-engine-prod
    profiles:
      - intent-engine  # 需要通过 profile 启动：docker compose --profile intent-engine up
    ports:
      - "${INTENT_ENGINE_PORT:-18566}:18566"
    restart: always
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18566/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    image: ${DOCKER_REGISTRY:-}ai-gateway-web:${VERSION:-latest}
    container_name: ai-gateway-web-prod
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - gateway
    restart: always
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================
  # Monitoring Stack (Always enabled in prod)
  # ===========================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ai-gateway-prometheus-prod
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: always
    networks:
      - ai-gateway-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.2.2
    container_name: ai-gateway-grafana-prod
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3001}
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: always
    networks:
      - ai-gateway-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: ai-gateway-alertmanager-prod
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=${ALERTMANAGER_URL:-http://localhost:9093}'
    restart: always
    networks:
      - ai-gateway-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ===========================================
# Volumes
# ===========================================

volumes:
  gateway-data:
    driver: local
  redis-data:
    driver: local
  ollama-data:
    driver: local
  qdrant-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

# ===========================================
# Networks
# ===========================================

networks:
  ai-gateway-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
