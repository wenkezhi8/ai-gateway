version: '3.8'

services:
  # AI Gateway Service
  gateway:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: ai-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - AIG_SERVER_PORT=8080
      - AIG_REDIS_HOST=redis
      - AIG_REDIS_PORT=6379
      - AIG_REDIS_ENABLED=true
    volumes:
      - gateway-data:/app/data
      - ../../configs:/app/configs:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ai-gateway-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: ai-gateway-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - gateway
    networks:
      - ai-gateway-network

networks:
  ai-gateway-network:
    driver: bridge

volumes:
  gateway-data:
  redis-data:
