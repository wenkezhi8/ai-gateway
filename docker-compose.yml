# ============================================
# AI Gateway - Docker Compose Configuration
# Complete deployment with monitoring stack
# ============================================

version: '3.8'

services:
  # ===========================================
  # Core Services
  # ===========================================

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8080"
    environment:
      - GIN_MODE=release
      - CONFIG_PATH=/app/configs/config.json
      - PORT=8080
      # Redis configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # API Keys (from .env file)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BACKUP_API_KEY=${OPENAI_BACKUP_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      # Volcano Ark (火山方舟)
      - VOLCANO_API_KEY=${VOLCANO_API_KEY:-}
      - VOLCANO_ENDPOINT=${VOLCANO_ENDPOINT:-}
      # Advanced settings
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-60}
      - MAX_REQUEST_SIZE=${MAX_REQUEST_SIZE:-10}
      # Cache settings
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - CACHE_MAX_SIZE=${CACHE_MAX_SIZE:-100}
      # Intent engine + vector cache
      - INTENT_ENGINE_ENABLED=${INTENT_ENGINE_ENABLED:-false}
      - INTENT_ENGINE_BASE_URL=${INTENT_ENGINE_BASE_URL:-http://intent-engine:18566}
      - VECTOR_CACHE_ENABLED=${VECTOR_CACHE_ENABLED:-true}
      - VECTOR_CACHE_DIMENSION=${VECTOR_CACHE_DIMENSION:-1024}
    volumes:
      - ./configs:/app/configs:ro
      - gateway-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      # intent-engine 是可选服务，当 INTENT_ENGINE_ENABLED=true 时才会真正需要
      # 如果使用 intent-engine，请先启动：docker compose --profile intent-engine up -d intent-engine
    restart: unless-stopped
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "prometheus.io/scrape=true"
      - "prometheus.io/port=8080"
      - "prometheus.io/path=/metrics"

  redis:
    image: redis/redis-stack-server:7.2.0-v18
    container_name: ai-gateway-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - ai-gateway-network
    command: >
      redis-stack-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  intent-engine:
    # 意图识别引擎（可选）。默认不启动，避免依赖私有镜像。
    # 使用方式：
    #   1. 设置环境变量 INTENT_ENGINE_ENABLED=true 启用该服务
    #   2. 设置环境变量 INTENT_ENGINE_IMAGE 指定镜像地址
    #   3. 或者修改下方 image 为公开镜像地址（如 Docker Hub 公开镜像）
    # 公开镜像示例（如存在）：
    #   image: ${INTENT_ENGINE_IMAGE:-docker.io/library/python:3.11}
    #   image: ${INTENT_ENGINE_IMAGE:-}  # 默认空，需手动指定镜像
    image: ${INTENT_ENGINE_IMAGE:-}
    container_name: ai-gateway-intent-engine
    profiles:
      - intent-engine  # 需要通过 profile 启动：docker compose --profile intent-engine up
    ports:
      - "${INTENT_ENGINE_PORT:-18566}:18566"
    restart: unless-stopped
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18566/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ai-gateway-web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - ai-gateway-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Monitoring Stack
  # ===========================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: ai-gateway-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - ai-gateway-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:10.2.2
    container_name: ai-gateway-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - ai-gateway-network
    profiles:
      - monitoring

  # ===========================================
  # Optional: Alert Manager
  # ===========================================

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: ai-gateway-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - ai-gateway-network
    profiles:
      - monitoring

# ===========================================
# Volumes
# ===========================================

volumes:
  gateway-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local

# ===========================================
# Networks
# ===========================================

networks:
  ai-gateway-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
