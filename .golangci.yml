# ============================================
# AI Gateway - golangci-lint Configuration
# Enterprise-grade linting configuration
# ============================================

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    
    # Additional linters for enterprise
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - stylecheck
    - unconvert
    - unparam
    - whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    enable-all: true
    disable:
      - fieldalignment
  
  gocyclo:
    min-complexity: 15
  
  dupl:
    threshold: 100
  
  goconst:
    min-len: 3
    min-occurrences: 3
  
  misspell:
    locale: US
  
  goimports:
    local-prefixes: ai-gateway
  
  gofmt:
    simplify: true
  
  gosec:
    excludes:
      - G104 # Audit errors not checked (handled by errcheck)
      - G304 # File path provided as taint input (config files)
    severity: medium
    confidence: medium
    config:
      G301: "0750"
      G302: "0640"
      G306: "0640"
  
  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc

  stylecheck:
    checks: ["-ST1000", "-ST1003"]

issues:
  exclude-dirs:
    - vendor
    - web
    - node_modules
    - data
    - monitoring
  exclude-files:
    - ".*\\.generated\\.go$"
  uniq-by-line: true
  exclude-rules:
    # Exclude some linters from test files
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
        - gocyclo
    
    # Exclude known issues in generated files
    - path: 'internal/docs/swagger\.go'
      linters:
        - all
    
    # Exclude DB and external interaction tests
    - path: tests/integration/
      linters:
        - gosec
    
    # Allow init functions in main package
    - path: cmd/
      linters:
        - gochecknoinits
    
    # Allow long lines in test files
    - path: _test\.go
      linters:
        - lll

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

severity:
  default-severity: error
  case-sensitive: true
