# ============================================
# AI Gateway - golangci-lint Configuration
# Enterprise-grade linting configuration
# ============================================

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  govet:
    disable:
      - shadow
  
  goimports:
    local-prefixes: ai-gateway
  
  gofmt:
    simplify: true
  

issues:
  exclude-dirs:
    - vendor
    - web
    - node_modules
    - data
    - monitoring
  exclude-files:
    - ".*\\.generated\\.go$"
  uniq-by-line: true
  exclude-rules:
    # Exclude some linters from test files
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - goconst
        - gocyclo
    
    # Exclude known issues in generated files
    - path: 'internal/docs/swagger\.go'
      linters:
        - all
    
    # Exclude DB and external interaction tests
    - path: tests/integration/
      linters:
        - gosec
    
    # Allow init functions in main package
    - path: cmd/
      linters:
        - gochecknoinits
    
    # Allow long lines in test files
    - path: _test\.go
      linters:
        - lll

  max-issues-per-linter: 0
  max-same-issues: 0
  new: false

severity:
  default-severity: error
  case-sensitive: true
