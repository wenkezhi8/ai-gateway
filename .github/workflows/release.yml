# ============================================
# AI Gateway - Release Workflow
# Create releases with changelog and artifacts
# ============================================

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  # ===========================================
  # Prepare Release
  # ===========================================
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release, get all commits
            COMMITS=$(git log --pretty=format:"- %s" --reverse)
          else
            # Get commits since last tag
            COMMITS=$(git log $PREV_TAG..HEAD --pretty=format:"- %s" --reverse)
          fi

          # Save changelog
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "$COMMITS" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.get_version.outputs.version }}" >> CHANGELOG.md

          # Save to output
          CHANGELOG_CONTENT=$(cat CHANGELOG.md)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ===========================================
  # Build Release Artifacts
  # ===========================================
  build-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: prepare-release

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ''
          - os: linux
            arch: arm64
            ext: ''
          - os: darwin
            arch: amd64
            ext: ''
          - os: darwin
            arch: arm64
            ext: ''
          - os: windows
            arch: amd64
            ext: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=ai-gateway-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          go build -ldflags="-s -w -X main.Version=${{ needs.prepare-release.outputs.version }}" -o $BINARY_NAME ./cmd/gateway

      - name: Create archive
        run: |
          BINARY_NAME=ai-gateway-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          ARCHIVE_NAME=ai-gateway-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

          mkdir -p release
          cp $BINARY_NAME release/
          cp -r configs release/
          cp .env.example release/.env
          cp README.md release/
          cp LICENSE release/ 2>/dev/null || true

          tar -czf $ARCHIVE_NAME -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ai-gateway-${{ matrix.os }}-${{ matrix.arch }}
          path: ai-gateway-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  # ===========================================
  # Build Docker Images
  # ===========================================
  build-docker-release:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: prepare-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-gateway:${{ needs.prepare-release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ai-gateway:latest
          build-args: |
            VERSION=${{ needs.prepare-release.outputs.version }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ai-gateway-web:${{ needs.prepare-release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ai-gateway-web:latest

  # ===========================================
  # Create GitHub Release
  # ===========================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, build-release, build-docker-release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare-release.outputs.version }}
          name: AI Gateway ${{ needs.prepare-release.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(needs.prepare-release.outputs.version, '-rc') || contains(needs.prepare-release.outputs.version, '-beta') || contains(needs.prepare-release.outputs.version, '-alpha') }}
          files: |
            artifacts/**/*.tar.gz
            deploy/docker-compose.prod.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VERSION file
        run: |
          echo "${{ needs.prepare-release.outputs.version }}" > VERSION
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "chore: update VERSION to ${{ needs.prepare-release.outputs.version }}" || echo "No changes"
          git push

  # ===========================================
  # Notify
  # ===========================================
  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Send notification
        run: |
          echo "Release ${{ needs.prepare-release.outputs.version }} published successfully!"
          # Add notification logic here (Slack, Discord, Email, etc.)
