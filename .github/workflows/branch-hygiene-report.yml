name: Branch Hygiene Report

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  branch-hygiene-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate branch report
        run: bash scripts/branch-hygiene-report.sh --base-branch main --output /tmp/branch-hygiene-report.md

      - name: Create or update hygiene issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const owner = context.repo.owner
            const repo = context.repo.repo
            const title = '仓库分支卫生报告（自动更新）'
            const report = fs.readFileSync('/tmp/branch-hygiene-report.md', 'utf8')

            try {
              await github.rest.issues.getLabel({ owner, repo, name: 'branch-hygiene' })
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: 'branch-hygiene',
                  color: '1D76DB',
                  description: '定期分支卫生报告'
                })
              } else {
                throw error
              }
            }

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: 'branch-hygiene',
              per_page: 100
            })

            const existing = issues.data.find(item => item.title === title)

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body: report
              })
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body: report,
                labels: ['branch-hygiene']
              })
            }
