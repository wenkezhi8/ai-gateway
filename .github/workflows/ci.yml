# ============================================
# AI Gateway - CI/CD Pipeline
# ============================================
name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
jobs:
  pr-guardrails:
    name: PR Guardrails
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
      - name: Build PR labels
        run: |
          LABELS=$(jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" | paste -sd, -)
          echo "PR_LABELS=$LABELS" >> "$GITHUB_ENV"
      - name: Check PR scope
        run: python3 scripts/check_pr_scope.py --rules .github/pr-scope-rules.json --labels "$PR_LABELS" --base-ref "${{ github.base_ref }}"
      - name: Check workflow changes allowlist
        run: bash scripts/check_workflow_changes.sh --base-ref "${{ github.base_ref }}" --allowlist .github/workflow-change-allowlist.txt

  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: ./web
        run: npm ci
      - name: Run lint
        working-directory: ./web
        run: npm run lint
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -race ./...
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: ./web
        run: |
          npm ci
          npm run build
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
