# ============================================
# AI Gateway - CI/CD Pipeline
# ============================================
name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
jobs:
  lint-backend:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m
          only-new-issues: true
  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: ./web
        run: npm ci
      - name: Detect changed frontend source files
        id: changed-frontend
        uses: tj-actions/changed-files@v45
        with:
          files: |
            web/**/*.{js,jsx,ts,tsx,vue}
      - name: Run lint for changed frontend files
        if: steps.changed-frontend.outputs.any_changed == 'true'
        working-directory: ./web
        run: |
          files=""
          for path in ${{ steps.changed-frontend.outputs.all_changed_and_modified_files }}; do
            case "$path" in
              web/*) files="$files ${path#web/}" ;;
            esac
          done

          if [ -z "$files" ]; then
            echo "No changed frontend source files after filtering."
            exit 0
          fi

          echo "Linting changed files:$files"
          npx eslint --quiet --max-warnings 0 $files
      - name: Skip lint when no frontend source files changed
        if: steps.changed-frontend.outputs.any_changed != 'true'
        run: echo "No frontend source changes detected; skip frontend lint."
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -v -race ./...
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: ./web
        run: |
          npm ci
          npm run build
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ai-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
