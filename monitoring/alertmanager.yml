# ============================================
# Alertmanager Configuration for AI Gateway
# ============================================

global:
  # SMTP configuration for email notifications
  smtp_smarthost: "${SMTP_HOST}:${SMTP_PORT}"
  smtp_from: "${SMTP_FROM}"
  smtp_auth_username: "${SMTP_USER}"
  smtp_auth_password: "${SMTP_PASSWORD}"
  smtp_require_tls: true

  # Default resolve timeout
  resolve_timeout: 5m

# Inhibition rules - suppress lower severity when higher is firing
inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'instance']

  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="info"
    equal: ['alertname']

  - source_matchers:
      - severity="warning"
    target_matchers:
      - severity="info"
    equal: ['alertname']

# Route tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'service']

  # Wait time before sending initial notification
  group_wait: 30s

  # Wait time before sending updated notification
  group_interval: 5m

  # Wait time before resending notification
  repeat_interval: 4h

  # Child routes
  routes:
    # Critical alerts - immediate notification
    - matchers:
        - severity="critical"
      receiver: 'critical-receiver'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      continue: true

    # Warning alerts
    - matchers:
        - severity="warning"
      receiver: 'warning-receiver'
      group_wait: 1m
      group_interval: 5m
      repeat_interval: 4h

    # Info alerts
    - matchers:
        - severity="info"
      receiver: 'info-receiver'
      group_wait: 5m
      group_interval: 10m
      repeat_interval: 24h

# Receivers
receivers:
  - name: 'default-receiver'
    # Webhook to gateway for processing
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 100

  - name: 'critical-receiver'
    # Webhook for DingTalk notification (via gateway)
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 50
    # Email for critical alerts
    email_configs:
      - to: '${EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] AI Gateway Alert - {{ .GroupLabels.alertname }}'
        html: |
          <h2>AI Gateway Critical Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Severity:</strong> Critical</p>
          {{ range .Alerts }}
          <hr>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          <p><strong>Message:</strong> {{ .Annotations.message }}</p>
          <p><strong>Starts At:</strong> {{ .StartsAt }}</p>
          {{ if .EndsAt }}
          <p><strong>Ends At:</strong> {{ .EndsAt }}</p>
          {{ end }}
          {{ end }}

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 100
    email_configs:
      - to: '${EMAIL_TO}'
        send_resolved: true
        headers:
          Subject: '[WARNING] AI Gateway Alert - {{ .GroupLabels.alertname }}'

  - name: 'info-receiver'
    webhook_configs:
      - url: 'http://gateway:8080/api/v1/alerts/webhook'
        send_resolved: true
        max_alerts: 200
