# ============================================
# Prometheus Alert Rules for AI Gateway
# ============================================

groups:
  - name: ai-gateway-availability
    rules:
      # Service availability alerts
      - alert: GatewayDown
        expr: up{job="ai-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "AI Gateway service is down"
          message: "AI Gateway instance {{ $labels.instance }} has been down for more than 1 minute."

      - alert: GatewayRestarted
        expr: resets(up{job="ai-gateway"}[10m]) > 0
        for: 0m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "AI Gateway was restarted"
          message: "AI Gateway has been restarted recently."

  - name: ai-gateway-errors
    rules:
      # High error rate alerts
      - alert: GatewayHighErrorRate
        expr: |
          sum(rate(ai_gateway_api_requests_failed_total[5m])) by (endpoint)
          /
          sum(rate(ai_gateway_api_requests_total[5m])) by (endpoint)
          > 0.05
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High error rate on AI Gateway"
          message: "Endpoint {{ $labels.endpoint }} has error rate > 5% for 5 minutes. Current: {{ $value | humanizePercentage }}"

      - alert: GatewayCriticalErrorRate
        expr: |
          sum(rate(ai_gateway_api_requests_failed_total[5m])) by (endpoint)
          /
          sum(rate(ai_gateway_api_requests_total[5m])) by (endpoint)
          > 0.15
        for: 3m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Critical error rate on AI Gateway"
          message: "Endpoint {{ $labels.endpoint }} has critical error rate > 15%. Current: {{ $value | humanizePercentage }}"

      - alert: High5xxErrorRate
        expr: |
          sum(rate(ai_gateway_api_requests_total{status="5xx"}[5m]))
          /
          sum(rate(ai_gateway_api_requests_total[5m]))
          > 0.01
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High 5xx server error rate"
          message: "5xx error rate is {{ $value | humanizePercentage }}. This indicates server-side issues."

  - name: ai-gateway-latency
    rules:
      # Response time alerts
      - alert: GatewayHighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(ai_gateway_api_response_time_seconds_bucket[5m])) by (le, endpoint))
          > 0.2
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High API response time (P99 > 200ms)"
          message: "Endpoint {{ $labels.endpoint }} P99 latency is {{ $value | humanizeDuration }}, exceeding 200ms threshold."

      - alert: GatewayVeryHighLatencyP99
        expr: |
          histogram_quantile(0.99, sum(rate(ai_gateway_api_response_time_seconds_bucket[5m])) by (le, endpoint))
          > 0.5
        for: 3m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Critical API response time (P99 > 500ms)"
          message: "Endpoint {{ $labels.endpoint }} P99 latency is {{ $value | humanizeDuration }}, exceeding 500ms threshold."

      - alert: GatewayHighLatencyP95
        expr: |
          histogram_quantile(0.95, sum(rate(ai_gateway_api_response_time_seconds_bucket[5m])) by (le))
          > 0.1
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High P95 response time (> 100ms)"
          message: "Overall P95 latency is {{ $value | humanizeDuration }}."

  - name: ai-gateway-tokens
    rules:
      # Token usage alerts
      - alert: TokenUsageHigh
        expr: ai_gateway_api_token_usage_percent > 80
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Token usage above 80%"
          message: "User {{ $labels.user_id }} model {{ $labels.model }} token usage is at {{ $value }}%."

      - alert: TokenUsageCritical
        expr: ai_gateway_api_token_usage_percent > 90
        for: 2m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Token usage above 90%"
          message: "User {{ $labels.user_id }} model {{ $labels.model }} token usage is at {{ $value }}%. Immediate attention required."

      - alert: TokenUsageSpike
        expr: |
          deriv(ai_gateway_api_tokens_total[5m]) > 1000
        for: 2m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Unusual token consumption spike"
          message: "Token consumption rate has spiked. Current derivative: {{ $value }} tokens/sec."

  - name: ai-gateway-providers
    rules:
      # Provider failure alerts
      - alert: ProviderHighFailureRate
        expr: ai_gateway_provider_failure_rate > 5
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Provider failure rate > 5%"
          message: "Provider {{ $labels.provider }} has failure rate of {{ $value }}%. Check provider status."

      - alert: ProviderCriticalFailureRate
        expr: ai_gateway_provider_failure_rate > 15
        for: 3m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Provider failure rate > 15%"
          message: "Provider {{ $labels.provider }} has critical failure rate of {{ $value }}%. Consider switching providers."

      - alert: ProviderLatencyHigh
        expr: |
          histogram_quantile(0.95, sum(rate(ai_gateway_provider_latency_seconds_bucket[5m])) by (le, provider))
          > 10
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Provider latency is high (P95 > 10s)"
          message: "Provider {{ $labels.provider }} P95 latency is {{ $value | humanizeDuration }}."

      - alert: ProviderTimeoutIncrease
        expr: |
          rate(ai_gateway_provider_requests_failed_total{error_type="timeout"}[5m])
          >
          rate(ai_gateway_provider_requests_total[5m]) * 0.1
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High provider timeout rate"
          message: "Provider {{ $labels.provider }} is experiencing frequent timeouts."

  - name: ai-gateway-cache
    rules:
      # Cache performance alerts
      - alert: CacheHitRateLow
        expr: ai_gateway_api_cache_hit_rate < 20
        for: 15m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Cache hit rate below 20%"
          message: "Cache {{ $labels.cache_type }} hit rate is only {{ $value }}%. Consider reviewing cache strategy."

      - alert: CacheHitRateDegraded
        expr: |
          deriv(ai_gateway_api_cache_hit_rate[30m]) < -10
        for: 10m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "Cache hit rate is degrading"
          message: "Cache {{ $labels.cache_type }} hit rate is rapidly decreasing."

  - name: ai-gateway-ratelimit
    rules:
      # Rate limiter alerts
      - alert: RateLimitExceededFrequently
        expr: |
          sum(rate(ai_gateway_ratelimit_exceeded_total[5m])) by (user_id)
          > 10
        for: 5m
        labels:
          severity: info
          service: ai-gateway
        annotations:
          summary: "User frequently exceeding rate limits"
          message: "User {{ $labels.user_id }} is exceeding rate limits frequently ({{ $value }}/s). Consider adjusting limits."

  - name: ai-gateway-connections
    rules:
      # Connection alerts
      - alert: HighActiveConnections
        expr: sum(ai_gateway_api_active_connections) > 1000
        for: 5m
        labels:
          severity: warning
          service: ai-gateway
        annotations:
          summary: "High number of active connections"
          message: "There are {{ $value }} active connections. Consider scaling."

      - alert: ConnectionPoolExhaustion
        expr: |
          sum(ai_gateway_api_active_connections) / 1000 > 0.8
        for: 5m
        labels:
          severity: critical
          service: ai-gateway
        annotations:
          summary: "Connection pool nearing exhaustion"
          message: "Connection pool is at {{ $value | humanizePercentage }} capacity."

  - name: redis
    rules:
      # Redis alerts
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          message: "Redis has been down for more than 1 minute."

      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis memory usage high"
          message: "Redis memory usage is at {{ $value | humanizePercentage }}."
